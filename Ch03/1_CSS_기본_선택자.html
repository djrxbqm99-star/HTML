<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>1_CSS 선택자</title>
        <!--
        날짜 : 2026.05.12
        이름 : 김민찬
        내용 : CSS 기본 선택자 실습 

        class 속성
        - 하나 이상의 태그를 식별하는 그룹값
        - 여러 태그에 공통의 스타일 처리를 위한 속성 

        id 속성
        - 유일한 하나의 태그를 식별하는 유일값 
        - 기능 동작 처리를 위한 속성

        -->

        <style>
            /*
            css 코드 작성 
            */

            /* 전체 선책자 */
            * {
                color: red;
            }


            /* 태그 선책자 */

            h3{
                color: blue;
            }
            
            p{
                color: green;
            }


            /* 클레스 선책자 */
            .text{
                color: orange;
            }




            /* 아이디 선책자 */
            #text{
                color: yellow;
            }




        </style>







    </head>
    <body>
        <h3>1.CSS 기본 선택자</h3>

        <p>
            Hello World <br>
            Hello HTML5<br>
            Hello class
        </p>
        <p class="text">
            Hello World <br>
            Hello HTML5<br>
            Hello class
        </p>
        <p class="text">
            Hello World <br>
            Hello HTML5<br>
            Hello class
        </p>
        <p id="text" class="text">
            Hello World <br>
            Hello HTML5<br>
            Hello class
        </p>






    </body>
</html>
