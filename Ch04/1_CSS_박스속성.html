<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1_CSS_박스속성</title>
    <style>
    div{
        display: inline-block;
        width: 100px;
        height: 100px;
        background: orange;
    }
        /* width,height*/

        section:nth-of-type(1) > div:nth-child(1){
            width: 50px;
            height: 50px;

        }
        section:nth-of-type(2) > div:nth-child(2){
            width: 10%;
            height: 100px;
        }
        section:nth-of-type(3) > div:nth-child(3){
            width: 50%;
            height: 100px;

        }







        /* margin,padding*/

        /* border*/

        /* box-sizing*/








    </style>
</head>
<body>
    <h3>1. CSS 박스속성</h3>

    <h4>width,height</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>

    <h4>margin,padding</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </section> 

    <h4>border</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>


    <h4>box-sizing</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>


   



</body>
</html>
