<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 비밀번호 변경</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            font-size: 14px;
            color: #333;
            background-color: #fff;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== HEADER ===== */
        header {
            border-bottom: 1px solid #ddd;
            padding: 0 40px;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
        }

        .logo {
            width: 160px;
            height: 50px;
            border: 2px solid #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }

        .header-nav {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .header-nav a { color: #555; }
        .header-nav a:hover { color: #4CAF50; }

        /* ===== MAIN ===== */
        main {
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px 60px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            padding-bottom: 12px;
            border-bottom: 2px solid #333;
            margin-bottom: 0;
        }

        /* ===== 테이블 ===== */
        .form-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }

        .form-table tr {
            border-bottom: 1px solid #ddd;
        }

        .form-table th {
            width: 130px;
            padding: 12px 10px;
            text-align: left;
            font-weight: normal;
            font-size: 13px;
            color: #333;
            vertical-align: middle;
            white-space: nowrap;
            background-color: #f7f7f7;
        }

        .form-table td {
            padding: 8px 10px;
            vertical-align: middle;
            font-size: 13px;
        }

        .form-table input[type="password"] {
            height: 30px;
            width: 200px;
            border: 1px solid #ccc;
            padding: 0 8px;
            font-size: 13px;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            color: #333;
            outline: none;
        }

        .form-table input[type="password"]:focus {
            border-color: #4CAF50;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #pw-msg {
            font-size: 12px;
            color: #888;
        }

        /* 안내문구 */
        .guide-text {
            font-size: 12px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        /* 버튼 영역 */
        .btn-area {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            width: 100px;
            padding: 12px 0;
            background-color: #888;
            color: #fff;
            font-size: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        .btn-cancel:hover { background-color: #666; }

        .btn-next {
            width: 100px;
            padding: 12px 0;
            background-color: #5b9bd5;
            color: #fff;
            font-size: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        .btn-next:hover { background-color: #4a86be; }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid #ddd;
            margin-top: 60px;
        }

        .footer-copyright {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <div class="header-inner">
            <a href="./login.html" class="logo">CI ( 로고 )</a>
            <nav class="header-nav">
                <a href="./login.html">로그인</a>
                <a href="/kmarket/member/join">회원가입</a>
                <a href="/kmarket/member/mypage">마이페이지</a>
                <a href="/kmarket/cart">🛒 장바구니</a>
            </nav>
        </div>
    </header>

    <!-- 메인 -->
    <main>
        <h2 class="section-title">비밀번호 변경</h2>

        <!-- ① 폼 -->
        <table class="form-table">
            <tr>
                <th>아이디</th>
                <td>honggildong</td>
            </tr>
            <tr>
                <th>새 비밀번호</th>
                <td>
                    <div class="input-row">
                        <input type="password" placeholder="새 비밀번호 입력" id="newPw">
                        <span id="pw-msg">사용 가능한 비밀번호 입니다.</span>
                    </div>
                </td>
            </tr>
            <tr>
                <th>새 비밀번호 확인</th>
                <td>
                    <input type="password" placeholder="새 비밀번호 확인 입력" id="newPwConfirm">
                </td>
            </tr>
        </table>

        <p class="guide-text">
            비밀번호를 변경해 주세요.<br>
            영문, 숫자, 특수문자를 사용하여 8자 이상 입력해 주세요.
        </p>

        <!-- ② 취소/다음 버튼 -->
        <div class="btn-area">
            <button type="button" class="btn-cancel"
                onclick="location.href='./login.html'">취소</button>
            <button type="button" class="btn-next"
                onclick="submitPw()">다음</button>
        </div>
    </main>

    <!-- 푸터 -->
    <footer>
        <div class="footer-copyright">
            Copyright © 2025 김철학 All rights reserved.
        </div>
    </footer>

    <script>
        document.getElementById('newPw').addEventListener('input', function() {
            const pw = this.value;
            const msg = document.getElementById('pw-msg');
            if (pw.length >= 8 && pw.length <= 12) {
                msg.style.color = '#4CAF50';
                msg.textContent = '사용 가능한 비밀번호 입니다.';
            } else if (pw.length > 0) {
                msg.style.color = '#c0392b';
                msg.textContent = '8~12자로 입력해 주세요.';
            } else {
                msg.style.color = '#888';
                msg.textContent = '사용 가능한 비밀번호 입니다.';
            }
        });

        function submitPw() {
            const pw   = document.getElementById('newPw').value;
            const pwCf = document.getElementById('newPwConfirm').value;
            if (!pw || pw.length < 8 || pw.length > 12) {
                alert('비밀번호는 8~12자로 입력해 주세요.'); return;
            }
            if (pw !== pwCf) {
                alert('비밀번호가 일치하지 않습니다.'); return;
            }
            alert('비밀번호가 변경되었습니다.');
            window.location.href = './login.html';
        }
    </script>

</body>
</html>
