

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나의설정 | K-Market</title>
<link rel="stylesheet" href="/css/my/info.css">
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="header-inner">
        <a href="/" class="logo">CI ( 로고 )</a>
        <nav class="header-nav">
            <a href="/member/login.html">로그인</a>
            <a href="/member/join.html">회원가입</a>
            <a href="home.html" class="active">마이페이지</a>
            <a href="/cart">🛒장바구니</a>
        </nav>
    </div>
</header>

<!-- ===== MAIN ===== -->
<main>

    <!-- 1번 영역: 요약 정보 (가로 풀폭, 회색바탕) -->
    <section class="my-summary">
        <span class="my-summary-title">나의쇼핑정보</span>
        <div class="summary-items">
            <div class="summary-item">
                <span class="summary-label">주문</span>
                <span class="summary-num">2</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">쿠폰</span>
                <span class="summary-num">1</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">포인트</span>
                <span class="summary-num">1,000</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">문의</span>
                <span class="summary-num">1</span>
            </div>
        </div>
    </section>

    <!-- 2번 영역(사이드바) + 콘텐츠 영역을 나란히 배치 -->
    <div class="my-wrapper">

        <!-- 2번 영역: 사이드바 (전체주문내역 active) -->
        <aside class="sidebar">
                        <nav class="sidebar-menu">
                <ul>
                    <li><a href="order.html" data-menu="orders">전체주문내역</a></li>
                    <li><a href="point.html" data-menu="points">포인트내역</a></li>
                    <li><a href="coupon.html" data-menu="coupons">쿠폰</a></li>
                    <li><a href="review.html" data-menu="reviews">나의리뷰</a></li>
                    <li><a href="qna.html" data-menu="inquiry">문의하기</a></li>
                    <li><a href="info.html" class="active" data-menu="settings">나의설정</a></li>
                </ul>
            </nav>
        </aside>

        <!-- 콘텐츠 영역 -->
        <div class="my-content">

            <!-- 3번 영역: 배너 광고 -->
            <div class="my-banner">810 × 86 배너 광고</div>

            <!-- 3번 영역: 나의설정 폼 -->
            <section class="my-section">
                <div class="section-header">
                    <span class="section-title">나의설정</span>
                </div>

                <table class="info-table">
                    <tbody>
                        <!-- 사용자 ID -->
                        <tr>
                            <th>사용자 ID</th>
                            <td><span class="info-value">chh****</span></td>
                        </tr>
                        <!-- 비밀번호 -->
                        <tr>
                            <th>비밀번호</th>
                            <td>
                                <button type="button" class="btn-info-action" id="pwChangeBtn">비밀번호수정</button>
                            </td>
                        </tr>
                        <!-- 이름 -->
                        <tr>
                            <th>이름</th>
                            <td><span class="info-value">김 *학</span></td>
                        </tr>
                        <!-- 생년월일 -->
                        <tr>
                            <th>생년 월일</th>
                            <td><span class="info-value">1983년 05월 03일</span></td>
                        </tr>
                        <!-- Email -->
                        <tr>
                            <th>Email</th>
                            <td>
                                <div class="info-email-row">
                                    <input type="text" class="info-input info-email-local" id="emailLocal" value="chhak0503" disabled>
                                    <span class="info-at">@</span>
                                    <input type="text" class="info-input info-email-domain" id="emailDomain" value="naver.com" disabled>
                                    <select class="info-select" id="emailDomainSelect" disabled>
                                        <option value="">직접입력</option>
                                        <option value="naver.com">naver.com</option>
                                        <option value="gmail.com">gmail.com</option>
                                        <option value="daum.net">daum.net</option>
                                        <option value="kakao.com">kakao.com</option>
                                        <option value="nate.com">nate.com</option>
                                    </select>
                                    <button type="button" class="btn-info-edit" id="emailEditBtn">수정하기</button>
                                </div>
                            </td>
                        </tr>
                        <!-- 휴대폰 -->
                        <tr>
                            <th>휴대폰</th>
                            <td>
                                <div class="info-phone-row">
                                    <input type="text" class="info-input info-phone-part" id="phone1" value="010" maxlength="3" disabled>
                                    <span class="info-dash">-</span>
                                    <input type="text" class="info-input info-phone-part" id="phone2" value="1234" maxlength="4" disabled>
                                    <input type="text" class="info-input info-phone-part" id="phone3" value="5678" maxlength="4" disabled>
                                    <button type="button" class="btn-info-edit" id="phoneEditBtn">수정하기</button>
                                </div>
                            </td>
                        </tr>
                        <!-- 주소 -->
                        <tr>
                            <th>주소</th>
                            <td>
                                <div class="info-addr-row">
                                    <input type="text" class="info-input info-postcode" id="postcode" placeholder="우편번호" readonly>
                                    <button type="button" class="btn-info-edit" id="addrSearchBtn">주소검색</button>
                                </div>
                                <input type="text" class="info-input info-addr-full" id="addrBasic" placeholder="기본주소검색" readonly>
                                <input type="text" class="info-input info-addr-full" id="addrDetail" placeholder="상세주소입력">
                            </td>
                        </tr>
                        <!-- 탈퇴 -->
                        <tr>
                            <th>탈퇴</th>
                            <td>
                                <button type="button" class="btn-withdraw" id="withdrawBtn">탈퇴 하기</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="info-submit-wrap">
                    <button type="button" class="btn-info-submit" id="infoSubmitBtn">수정하기</button>
                </div>
            </section>

        </div>
    </div>
</main>

<!-- 탈퇴 확인 모달 -->
<div class="modal-overlay" id="withdrawModal">
    <div class="modal-box modal-box-confirm">
        <div class="modal-header modal-header-blue">
            <span class="modal-title">회원 탈퇴</span>
            <button type="button" class="modal-close" data-close="withdrawModal">&times;</button>
        </div>
        <div class="modal-body">
            <p class="modal-confirm-text">
                정말 탈퇴하시겠습니까?<br>
                탈퇴 시 모든 정보가 삭제되며 복구가 불가능합니다.
            </p>
            <div class="modal-confirm-btn-group">
                <button type="button" class="modal-btn-submit" id="withdrawConfirmBtn">확인</button>
                <button type="button" class="modal-btn-cancel" data-close="withdrawModal">취소</button>
            </div>
        </div>
    </div>
</div>

<script src="/js/my/info.js"></script>

</body>
</html>
