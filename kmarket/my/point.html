

<!DOCTYPE html>

            <a href="/signup">회원가입</a>
            <a href="/my/home" class="active">마이페이지</a>
            <a href="/cart">장바구니</a>
        </nav>
    </div>
</header>

<!-- ===== MAIN ===== -->
<main>

    <!-- 1번 영역: 요약 정보 (가로 풀폭, 회색바탕) -->
    <section class="my-summary">
        <span class="my-summary-title">나의쇼핑정보</span>
        <div class="summary-items">
            <div class="summary-item">
                <span class="summary-label">주문</span>
                <span class="summary-num">2</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">쿠폰</span>
                <span class="summary-num">1</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">포인트</span>
                <span class="summary-num">1,000</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">문의</span>
                <span class="summary-num">1</span>
            </div>
        </div>
    </section>

    <!-- 2번 영역(사이드바) + 콘텐츠 영역을 나란히 배치 -->
    <div class="my-wrapper">

        <!-- 2번 영역: 사이드바 (전체주문내역 active) -->
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="/my/orders" data-menu="orders">전체주문내역</a></li>
                    <li><a href="/my/points" class="active" data-menu="points">포인트내역</a></li>
                    <li><a href="/my/home#coupons" data-menu="coupons">쿠폰</a></li>
                    <li><a href="/my/home#reviews" data-menu="reviews">나의리뷰</a></li>
                    <li><a href="/my/home#inquiry" id="sidebarInquiryBtn" data-menu="inquiry">문의하기</a></li>
                    <li><a href="/my/home#settings" data-menu="settings">나의설정</a></li>
                </ul>
            </nav>
        </aside>

        <!-- 콘텐츠 영역 -->
        <div class="my-content">

            <!-- 3번 영역: 배너 광고 -->
            <div class="my-banner">810 × 86 배너 광고</div>

            <!-- 4번 영역: 포인트내역 -->
            <section class="my-section">
                <div class="section-header">
                    <span class="section-title">포인트내역</span>
                </div>

                <!-- 기간별조회 -->
                <div class="period-search">
                    <span class="period-search-label">기간별조회</span>

                    <div class="period-group">
                        <label class="period-radio">
                            <input type="radio" name="periodType" value="week" data-days="7">
                            1 주일
                        </label>
                        <label class="period-radio">
                            <input type="radio" name="periodType" value="halfmonth" data-days="15">
                            15 일
                        </label>
                        <label class="period-radio">
                            <input type="radio" name="periodType" value="month" data-days="30" checked>
                            1 개월
                        </label>
                    </div>

                    <div class="period-divider"></div>

                    <div class="period-group">
                        <select id="periodMonthSelect" class="period-select">
                            <option value="0">이번 달</option>
                            <option value="1">1 개월 전</option>
                            <option value="2">2 개월 전</option>
                            <option value="3">3 개월 전</option>
                            <option value="4">4 개월 전</option>
                        </select>
                    </div>

                    <div class="period-divider"></div>

                    <div class="period-group period-range">
                        <input type="date" id="periodStartDate" class="period-date-input">
                        <span class="period-range-tilde">~</span>
                        <input type="date" id="periodEndDate" class="period-date-input">
                    </div>

                    <button type="button" class="btn-period-search" id="periodSearchBtn">조회</button>
                </div>

                <table class="point-table">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>구분</th>
                            <th>주문번호</th>
                            <th>적립금액</th>
                            <th>비고</th>
                            <th>유효기간</th>
                        </tr>
                    </thead>
                    <tbody id="pointListBody">
                        <!-- JS로 동적 렌더링 -->
                    </tbody>
                </table>

                <!-- 페이지네이션 -->
                <div class="pagination" id="pagination">
                    <a href="#" class="page-prev" id="pagePrev">이전</a>
                    <span class="page-numbers" id="pageNumbers"></span>
                    <a href="#" class="page-next" id="pageNext">다음</a>
                </div>
            </section>

        </div>
    </div>
</main>

<!-- ===== FOOTER (축약형) ===== -->
<footer class="footer-simple">

        Copyright &copy; 김철학(개발에반하다.) All rights reserved.
    </div>
</footer>


<!-- =========================================================
     모달 영역 (home.html과 동일한 모달 시스템 재사용)
     ========================================================= -->

<!-- 문의하기 모달 (No 6-1-3) -->
<div class="modal-overlay" id="inquiryModal">
    <div class="modal-box modal-box-small">
        <div class="modal-header modal-header-blue">
            <span class="modal-title">문의하기</span>
            <button type="button" class="modal-close" data-close="inquiryModal">&times;</button>
        </div>

        <div class="modal-body">
            <table class="modal-inquiry-table">
                <tbody>
                    <tr>
                        <th>문의종류</th>
                        <td>
                            <label class="inquiry-radio"><input type="radio" name="inquiryType" value="product"> 상품</label>
                            <label class="inquiry-radio"><input type="radio" name="inquiryType" value="delivery"> 배송</label>
                            <label class="inquiry-radio"><input type="radio" name="inquiryType" value="return"> 반품/취소</label>
                            <label class="inquiry-radio"><input type="radio" name="inquiryType" value="exchange"> 교환</label>
                            <label class="inquiry-radio"><input type="radio" name="inquiryType" value="etc"> 기타</label>
                        </td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td><input type="email" class="inquiry-input" id="inquiryEmail" value="chh**@gmail.com"></td>
                    </tr>
                    <tr>
                        <th>제목</th>
                        <td><input type="text" class="inquiry-input" id="inquiryTitle"></td>
                    </tr>
                    <tr>
                        <th>내용</th>
                        <td><textarea class="inquiry-textarea" id="inquiryContent"></textarea></td>
                    </tr>
                </tbody>
            </table>

            <div class="modal-inquiry-btn-group">
                <button type="button" class="modal-btn-submit" id="inquirySubmitBtn">등록하기</button>
                <button type="button" class="modal-btn-cancel" data-close="inquiryModal">취소</button>
            </div>
        </div>
    </div>
</div>


<script>
    // ===== 모달 스택 관리 (home.html과 동일) =====
    const modalStack = [];

    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        if (!modal) return;

        const current = document.querySelector('.modal-overlay.active');
        if (current && current.id !== modalId) {
            current.classList.remove('active');
            modalStack.push(current.id);
        }

        modal.classList.add('active');
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        if (!modal) return;
        modal.classList.remove('active');

        if (modalStack.length > 0) {
            const prevId = modalStack.pop();
            const prevModal = document.getElementById(prevId);
            if (prevModal) prevModal.classList.add('active');
        }
    }

    document.querySelectorAll('[data-close]').forEach(function (btn) {
        btn.addEventListener('click', function () {
            closeModal(btn.getAttribute('data-close'));
        });
    });

    document.querySelectorAll('.modal-overlay').forEach(function (overlay) {
        overlay.addEventListener('click', function (e) {
            if (e.target === overlay) {
                closeModal(overlay.id);
            }
        });
    });

    // 문의하기(사이드바) 클릭 → 문의하기 모달
    document.getElementById('sidebarInquiryBtn').addEventListener('click', function (e) {
        e.preventDefault();
        openModal('inquiryModal');
    });

    // =====================================================
    // ===== 포인트내역: 더미 데이터 / 기간조회 / 페이지네이션 =====
    // =====================================================

    const PAGE_SIZE = 10;
    const TOTAL_PAGES = 5;
    const today = new Date();

    function formatDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
    }

    function formatComma(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    // ---- 더미 포인트내역 데이터 50건 생성 (페이지당 10건 x 5페이지) ----
    // 적립/사용 패턴이 섞여 나오도록 구성 (구분: 적립 / 사용)
    const pointTypeList = [
        { type: '적립', remark: '상품 구매확정', amountSign: 1 },
        { type: '적립', remark: '상품 구매확정', amountSign: 1 },
        { type: '사용', remark: '상품 구매 시 사용', amountSign: -1 },
        { type: '적립', remark: '리뷰 작성 적립', amountSign: 1 }
    ];

    const pointData = [];

    for (let i = 0; i < PAGE_SIZE * TOTAL_PAGES; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i * 3); // 3일 간격으로 과거로 이동 (최근 5개월 커버)

        const expireDate = new Date(d);
        expireDate.setFullYear(expireDate.getFullYear() + 2); // 적립일 기준 2년 유효

        const pattern = pointTypeList[i % pointTypeList.length];
        const baseAmount = 100 + (i % 5) * 60; // 100~340 사이 금액 분산
        const amount = baseAmount * pattern.amountSign;
        const orderNo = '2022' + String(121001 - i).padStart(6, '0');

        pointData.push({
            date: formatDate(d),
            type: pattern.type,
            orderNo: orderNo,
            amount: amount,
            remark: pattern.remark,
            expire: formatDate(expireDate)
        });
    }

    // ---- 상태 ----
    let currentPage = 1;
    let filteredData = pointData.slice(); // 기간조회 필터 적용 결과 (기본: 전체)

    function renderPointRows() {
        const tbody = document.getElementById('pointListBody');
        tbody.innerHTML = '';

        const startIdx = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filteredData.slice(startIdx, startIdx + PAGE_SIZE);

        if (pageItems.length === 0) {
            const emptyRow = document.createElement('tr');
            emptyRow.innerHTML = '<td colspan="6" class="order-empty">조회된 포인트내역이 없습니다.</td>';
            tbody.appendChild(emptyRow);
            return;
        }

        pageItems.forEach(function (item) {
            const tr = document.createElement('tr');
            const isPlus = item.amount >= 0;
            const amountText = (isPlus ? '+' : '-') + formatComma(Math.abs(item.amount));
            const amountClass = isPlus ? 'point-plus' : 'point-minus';

            tr.innerHTML = `
                <td>${item.date}</td>
                <td>${item.type}</td>
                <td>${item.orderNo}</td>
                <td class="${amountClass}">${amountText}</td>
                <td>${item.remark}</td>
                <td>${item.expire}</td>
            `;

            tbody.appendChild(tr);
        });
    }

    // ---- 페이지네이션 렌더링 ----
    function renderPagination() {
        const totalFilteredPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
        const pageNumbersEl = document.getElementById('pageNumbers');
        pageNumbersEl.innerHTML = '';

        for (let p = 1; p <= totalFilteredPages; p++) {
            const span = document.createElement('a');
            span.href = '#';
            span.textContent = p;
            span.className = 'page-num' + (p === currentPage ? ' active' : '');
            span.addEventListener('click', function (e) {
                e.preventDefault();
                currentPage = p;
                renderPointRows();
                renderPagination();
            });
            pageNumbersEl.appendChild(span);
        }

        document.getElementById('pagePrev').classList.toggle('disabled', currentPage === 1);
        document.getElementById('pageNext').classList.toggle('disabled', currentPage === totalFilteredPages);
    }

    document.getElementById('pagePrev').addEventListener('click', function (e) {
        e.preventDefault();
        if (currentPage > 1) {
            currentPage--;
            renderPointRows();
            renderPagination();
        }
    });

    document.getElementById('pageNext').addEventListener('click', function (e) {
        e.preventDefault();
        const totalFilteredPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
        if (currentPage < totalFilteredPages) {
            currentPage++;
            renderPointRows();
            renderPagination();
        }
    });

    // ---- 기간별조회 동작 ----
    document.querySelectorAll('input[name="periodType"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
            document.getElementById('periodMonthSelect').value = '0';
            document.getElementById('periodStartDate').value = '';
            document.getElementById('periodEndDate').value = '';
        });
    });

    document.getElementById('periodMonthSelect').addEventListener('change', function () {
        document.querySelectorAll('input[name="periodType"]').forEach(function (radio) {
            radio.checked = false;
        });
        document.getElementById('periodStartDate').value = '';
        document.getElementById('periodEndDate').value = '';
    });

    document.querySelectorAll('.period-date-input').forEach(function (input) {
        input.addEventListener('change', function () {
            document.querySelectorAll('input[name="periodType"]').forEach(function (radio) {
                radio.checked = false;
            });
            document.getElementById('periodMonthSelect').value = '0';
        });
    });

    document.getElementById('periodSearchBtn').addEventListener('click', function () {
        const checkedPeriod = document.querySelector('input[name="periodType"]:checked');
        const monthSelectValue = document.getElementById('periodMonthSelect').value;
        const startDateValue = document.getElementById('periodStartDate').value;
        const endDateValue = document.getElementById('periodEndDate').value;

        let rangeStart = null;
        let rangeEnd = null;

        if (startDateValue || endDateValue) {
            // 시작~종료 날짜 조회 (최대 1년치, 둘 다 입력된 경우만 동작)
            if (!startDateValue || !endDateValue) {
                alert('시작일과 종료일을 모두 선택해주세요.');
                return;
            }

            rangeStart = new Date(startDateValue);
            rangeEnd = new Date(endDateValue);

            if (rangeStart > rangeEnd) {
                alert('시작일이 종료일보다 늦을 수 없습니다.');
                return;
            }

            const oneYearLater = new Date(rangeStart);
            oneYearLater.setFullYear(oneYearLater.getFullYear() + 1);
            if (rangeEnd > oneYearLater) {
                alert('조회 기간은 최대 1년까지 가능합니다.');
                return;
            }
        } else if (checkedPeriod) {
            // 1주일 / 15일 / 1개월 단위 조회
            const days = parseInt(checkedPeriod.getAttribute('data-days'), 10);
            rangeEnd = new Date(today);
            rangeStart = new Date(today);
            rangeStart.setDate(rangeStart.getDate() - days);
        } else {
            // 현재 월에서 최신 5개월까지 조회 (개월 select)
            const monthsAgo = parseInt(monthSelectValue, 10);
            rangeEnd = new Date(today);
            rangeStart = new Date(today);
            rangeStart.setMonth(rangeStart.getMonth() - (monthsAgo + 1));
        }

        filteredData = pointData.filter(function (item) {
            const itemDate = new Date(item.date);
            return itemDate >= rangeStart && itemDate <= rangeEnd;
        });

        currentPage = 1;
        renderPointRows();
        renderPagination();
    });

    // ---- 초기 렌더링 ----
    renderPointRows();
    renderPagination();
</script>

</body>
</html>
