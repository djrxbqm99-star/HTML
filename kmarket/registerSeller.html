
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이마켓 - 판매자 회원가입</title>
    <link rel="stylesheet" href="./css/registerSeller.css">
</head>
<body>

    <!-- 헤더 -->
    <header>
        <div class="header-inner">
            <a href="./login.html" class="logo">CI ( 로고 )</a>
            <nav class="header-nav">
                <a href="./login.html">로그인</a>
                <a href="/kmarket/member/join" class="active">회원가입</a>
                <a href="/kmarket/member/mypage">마이페이지</a>
                <a href="/kmarket/cart">🛒 장바구니</a>
            </nav>
        </div>
    </header>

    <!-- 메인 -->
    <main>
        <h2 class="section-title">판매자 회원가입</h2>

        <table class="form-table">

            <!-- ① 계정 정보 -->
            <tr>
                <th>아이디</th>
                <td>
                    <input type="text" class="input-id" maxlength="12" id="userId">
                    <span class="hint">영문, 숫자  4~12자 설정</span>
                </td>
            </tr>
            <tr>
                <th>비밀번호</th>
                <td>
                    <input type="password" class="input-pw" id="userPw">
                    <span class="hint">영문, 숫자, 특수문자  8~12자 설정</span>
                </td>
            </tr>
            <tr>
                <th>비밀번호확인</th>
                <td>
                    <input type="password" class="input-pw" id="userPwConfirm">
                </td>
            </tr>

            <!-- 구분선 -->
            <tr class="divider"><th></th><td></td></tr>

            <!-- ② 회사 정보 -->
            <tr>
                <th>회사명</th>
                <td>
                    <input type="text" class="input-normal" placeholder="회사명입력 예) (주)삼호평" id="companyName">
                </td>
            </tr>
            <tr>
                <th>대표</th>
                <td>
                    <input type="text" class="input-normal" placeholder="이름입력" id="ceoName">
                </td>
            </tr>
            <tr>
                <th>사업자등록번호</th>
                <td>
                    <input type="text" class="input-biz" placeholder="이메일입력" id="bizNum">
                    <span class="hint-inline">- 포함  12 자리 입력</span>
                </td>
            </tr>
            <tr>
                <th>통신판매업번호</th>
                <td>
                    <input type="tel" class="input-normal" placeholder="휴대폰입력" id="mailOrderNum">
                </td>
            </tr>
            <tr>
                <th>전화번호</th>
                <td>
                    <input type="tel" class="input-normal" placeholder="전화번호입력" id="tel">
                </td>
            </tr>
            <tr>
                <th>팩스</th>
                <td>
                    <input type="tel" class="input-normal" placeholder="팩스번호입력" id="fax">
                </td>
            </tr>
            <tr>
                <th>주소</th>
                <td>
                    <div class="addr-group">
                        <div class="addr-row">
                            <input type="text" class="input-addr1" placeholder="우편번호검색클릭" id="postcode" readonly>
                            <button type="button" class="btn-postcode" onclick="openPostcode()">우편번호검색</button>
                        </div>
                        <div class="addr-row">
                            <input type="text" class="input-addr2" placeholder="기본주소검색" id="addrBase" readonly>
                        </div>
                        <div class="addr-row">
                            <input type="text" class="input-addr2" placeholder="상세주소입력" id="addrDetail">
                        </div>
                    </div>
                </td>
            </tr>
        </table>

        <!-- ③ 회원가입 버튼 -->
        <div class="btn-area">
            <button type="button" class="btn-submit" onclick="submitJoin()">회원가입</button>
        </div>
    </main>

    <!-- 푸터 -->
    <footer>
        
        <div class="footer-copyright">
            Copyright © 2025 김철학 All rights reserved.
        </div>
    </footer>

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        function openPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('postcode').value = data.zonecode;
                    document.getElementById('addrBase').value = data.roadAddress || data.jibunAddress;
                    document.getElementById('addrDetail').focus();
                }
            }).open();
        }

        function submitJoin() {
            const id      = document.getElementById('userId').value.trim();
            const pw      = document.getElementById('userPw').value;
            const pwCf    = document.getElementById('userPwConfirm').value;
            const company = document.getElementById('companyName').value.trim();
            const ceo     = document.getElementById('ceoName').value.trim();
            const bizNum  = document.getElementById('bizNum').value.trim();
            const mailNum = document.getElementById('mailOrderNum').value.trim();
            const tel     = document.getElementById('tel').value.trim();

            if (!id || id.length < 4 || id.length > 12) {
                alert('아이디는 4~12자로 입력해 주세요.'); return;
            }
            if (!pw || pw.length < 8 || pw.length > 12) {
                alert('비밀번호는 8~12자로 입력해 주세요.'); return;
            }
            if (pw !== pwCf) {
                alert('비밀번호가 일치하지 않습니다.'); return;
            }
            if (!company) {
                alert('회사명을 입력해 주세요.'); return;
            }
            if (!ceo) {
                alert('대표자명을 입력해 주세요.'); return;
            }
            if (!bizNum) {
                alert('사업자등록번호를 입력해 주세요.'); return;
            }
            if (!mailNum) {
                alert('통신판매업번호를 입력해 주세요.'); return;
            }
            if (!tel) {
                alert('전화번호를 입력해 주세요.'); return;
            }

            alert('판매자 회원가입이 완료되었습니다!');
            window.location.href = './login.html';
        }
    </script>

</body>
</html>
